apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-db
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/kristiaweeee/hw_kubiki.git'
    path: helm/db-chart
    targetRevision: main
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/kristiaweeee/hw_kubiki.git'
    path: helm/app-chart
    targetRevision: main
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/kristiaweeee/hw_kubiki.git'
    path: helm/monitoring-chart
    targetRevision: main
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
